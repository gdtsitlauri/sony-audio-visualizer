name: Build And Release

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build_windows:
    name: Build Windows x64
    runs-on: windows-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python 3.12
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install Dependencies
        run: |
          python -m pip install -U pip
          pip install -r requirements.txt

      - name: Build EXE
        shell: pwsh
        run: |
          ./build-windows.ps1 -Version "${{ github.ref_name }}"

      - name: Upload Windows Artifact
        uses: actions/upload-artifact@v4
        with:
          name: windows-x64
          path: dist/Sony-Visualizer-${{ github.ref_name }}-windows-x64.exe
          if-no-files-found: error

  build_linux:
    name: Build Linux x64
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python 3.12
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install Dependencies
        run: |
          python -m pip install -U pip
          pip install -r requirements.txt
          sudo apt-get update
          sudo apt-get install -y curl

      - name: Build AppImage
        env:
          RELEASE_TAG: ${{ github.ref_name }}
        run: |
          chmod +x build-linux.sh build-linux-appimage.sh
          bash build-linux-appimage.sh

      - name: Upload Linux Artifact
        uses: actions/upload-artifact@v4
        with:
          name: linux-x64
          path: dist/Sony-Visualizer-${{ github.ref_name }}-linux-x64.AppImage
          if-no-files-found: error

  build_macos:
    name: Build macOS
    runs-on: macos-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python 3.12
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install Dependencies
        run: |
          python -m pip install -U pip
          pip install -r requirements.txt

      - name: Build DMG
        env:
          RELEASE_TAG: ${{ github.ref_name }}
        run: |
          chmod +x build-macos.sh build-macos-dmg.sh
          bash build-macos-dmg.sh

      - name: Upload macOS Artifact
        uses: actions/upload-artifact@v4
        with:
          name: macos
          path: dist/Sony-Visualizer-${{ github.ref_name }}-macos.dmg
          if-no-files-found: error

  release:
    name: Publish GitHub Release
    needs:
      - build_windows
      - build_linux
      - build_macos
    runs-on: ubuntu-latest

    steps:
      - name: Download Artifacts
        uses: actions/download-artifact@v4
        with:
          path: release-assets

      - name: Publish Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.ref_name }}
          generate_release_notes: true
          files: |
            release-assets/windows-x64/*
            release-assets/linux-x64/*
            release-assets/macos/*
